      <h2>什么是客户端</h2>
<p>客户端就是你手机或电脑里用于导入配置、选择节点并连接网络的软件。</p>
<h2>什么是订阅链接</h2>
<p>订阅链接是机场提供的配置入口，导入后客户端可以自动更新节点列表。</p>
<h2>什么是节点</h2>
<p>节点就是实际连接使用的线路。不同节点速度、地区和稳定性可能不同。</p>
